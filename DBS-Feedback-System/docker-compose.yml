services:
  # MySQL Database
  mysql:
    image: mysql:8.0.35
    container_name: feedback-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-universal_feedback}
      MYSQL_USER: ${MYSQL_USER:-universal_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-universal_pass123}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - feedback-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --bind-address=0.0.0.0
      --max_connections=200
      --innodb_buffer_pool_size=256M

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feedback-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8085}:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-docker}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-universal_feedback}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-universal_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-universal_pass123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      ML_SERVICE_URL: http://ml-service:5000
      # Secrets / external settings (provide via .env or CI/CD secrets)
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      APP_UI_BASE_URL: ${APP_UI_BASE_URL:-http://localhost:${FRONTEND_PORT:-3000}}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - feedback-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedback-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      REACT_APP_API_URL: http://localhost:${BACKEND_PORT:-8085}
      REACT_APP_ML_SERVICE_URL: http://localhost:5000
      REACT_APP_CHATBOT_URL: http://localhost:${CHATBOT_PORT:-4002}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feedback-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ML Sentiment Analysis Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
      args:
        - ML_MODE=${ML_MODE:-mock}
    container_name: feedback-ml-service
    restart: unless-stopped
    ports:
      - "${ML_SERVICE_PORT:-5000}:5000"
    environment:
      PYTHONUNBUFFERED: 1
      MODEL_PATH: /home/appuser/models
      ML_MODE: ${ML_MODE:-mock}
    networks:
      - feedback-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Chatbot Node API
  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: chatbot-api
    restart: unless-stopped
    ports:
      - "${CHATBOT_PORT:-4002}:4002"
    environment:
      PORT: 4002
      AI_SERVICE: orchestrator
      ORCHESTRATOR_URL: http://orchestrator:5050
      BACKEND_BASE_URL: http://backend:8085
      HUGGINGFACE_URL: http://chatbot-hf:5001
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
    depends_on:
      backend:
        condition: service_healthy
      chatbot-hf:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    networks:
      - feedback-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Hugging Face-like Python service used by chatbot
  chatbot-hf:
    build:
      context: ./chatbot
      dockerfile: Dockerfile.hf
    container_name: chatbot-hf
    restart: unless-stopped
    ports:
      - "${CHATBOT_HF_PORT:-5001}:5001"
    networks:
      - feedback-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;\nimport contextlib;\n\ntry:\n    with contextlib.closing(urllib.request.urlopen('http://localhost:5001/health', timeout=3)) as r:\n        sys.exit(0 if getattr(r, 'status', 200)==200 else 1)\nexcept Exception:\n    sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8085
      ML_URL: http://ml-service:5000
    ports:
      - "5050:5050"
    networks:
      - feedback-net
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request, sys\ntry:\n    with urllib.request.urlopen('http://localhost:5050/health', timeout=3) as r:\n        sys.exit(0 if getattr(r, 'status', 200)==200 else 1)\nexcept Exception:\n    sys.exit(1)\nPY\n"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data/mysql}

networks:
  feedback-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
