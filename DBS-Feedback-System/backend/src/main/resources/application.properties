# Multipart upload limits (raise if needed)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Digest agent configuration
# Enable to send daily digests on schedule; manual POST works regardless of this flag
app.agents.digest.enabled=true
# Cron expression for scheduler (set to 9:00 and 16:00 every day)
app.agents.digest.cron=0 0 9,16 * * *
# When true, scheduled digest includes only CRITICAL/HIGH tasks
app.agents.digest.onlyCriticalHigh=false
# Optional comma-separated default recipients. If empty, targets all current assignees
app.agents.digest.recipients=

# SLA agent configuration
app.agents.sla.enabled=false
app.agents.sla.cron=0 0 * * * *
app.agents.sla.windows.CRITICAL=4
app.agents.sla.windows.HIGH=24
app.agents.sla.windows.MEDIUM=72
app.agents.sla.windows.LOW=120
app.agents.sla.escalationRecipients=

# Frontend UI base URL used in emails/deep links
app.ui.base-url=${APP_UI_BASE_URL:http://localhost:3000}

# Email review agent (Gmail via IMAP)
app.emailAgent.enabled=true
# Poll every 60s
app.emailAgent.poll-interval-ms=60000
# IMAP settings for Gmail
app.emailAgent.imap.host=${EMAIL_IMAP_HOST:imap.gmail.com}
app.emailAgent.imap.port=${EMAIL_IMAP_PORT:993}
app.emailAgent.imap.ssl=true
# Target mailbox username (defaults to spring.mail.username if set)
app.emailAgent.username=${EMAIL_USERNAME:${spring.mail.username:}}
# Required fields for feedback (comma-separated)
app.emailAgent.required-fields=${EMAIL_REQUIRED_FIELDS:customerName,userEmail,productId,rating,comment}

# Calendar auto-scheduling defaults
app.calendar.auto-schedule=false
app.calendar.default-duration-mins=30
