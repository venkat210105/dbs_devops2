<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Universal Feedback Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #db0011; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        th, td {
            border: none;
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #db0011;
            color: white;
        }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .important {
            background-color: #ffe5e5;
            color: #d10000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Universal Feedback Dashboard</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Email</th>
                <th>Category</th>
                <th>Channel</th>
                <th>Type</th>
                <th>Rating</th>
                <th>Comment</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="fb : ${feedbackList}">
                <td th:text="${fb.id}"></td>
                <td th:text="${fb.customerName}"></td>
                <td th:text="${fb.email}"></td>
                <td th:text="${fb.serviceCategory}"></td>
                <td th:text="${fb.serviceChannel}"></td>
                <td th:text="${fb.customerType}"></td>
                <td th:text="${fb.rating}"></td>
                <td th:text="${fb.comment}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
